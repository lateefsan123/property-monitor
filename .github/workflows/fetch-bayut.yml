name: Fetch Bayut Transactions

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch all Bayut transactions & sync to Supabase
        run: npm run fetch:bayut
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SHEET_URL: ${{ vars.SHEET_URL }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          REQUEST_RETRIES: ${{ vars.REQUEST_RETRIES }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
