name: Daily Enrichment

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh Bayut cache
        run: npm run fetch:bayut
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          BUILDINGS_FILE: ${{ vars.BUILDINGS_FILE }}
          BAYUT_MONTH_WINDOW: ${{ vars.BAYUT_MONTH_WINDOW }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          REQUEST_RETRIES: ${{ vars.REQUEST_RETRIES }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run daily enrichment
        run: npm run daily:enrich
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SHEET_URL: ${{ vars.SHEET_URL }}
          ENRICH_GROUP_LIMIT: ${{ vars.ENRICH_GROUP_LIMIT }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          REQUEST_RETRIES: ${{ vars.REQUEST_RETRIES }}
          FAIL_ON_ERROR: ${{ vars.FAIL_ON_ERROR }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-enrichment-report-${{ github.run_id }}
          path: reports/daily-enrichment-*.json
          if-no-files-found: warn
          retention-days: 14
