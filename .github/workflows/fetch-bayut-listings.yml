name: Fetch Bayut Listings

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch live Bayut listings per building
        run: npm run fetch:bayut-images
        env:
          VITE_RAPIDAPI_KEY: ${{ secrets.VITE_RAPIDAPI_KEY }}
          REQUEST_DELAY_MS: "800"

      - name: Build compact listing alerts feed
        run: npm run build:listing-alerts

      - name: Commit refreshed feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/bayut-apartment-images/manifest.json \
                  public/data/listing-alerts-feed.json \
                  mobile/src/data/listing-alerts-feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): refresh bayut listings"
            git push
          fi
